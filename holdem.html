<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="darkreader-lock" content="true"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>텍사스 홀덤 포커 — 기본 베팅 시스템</title>
  <meta name="description" content="기본 베팅 시스템(체크/콜, 레이즈, 폴드)의 직관적인 텍사스 홀덤 포커 게임입니다."/>
  <link rel="stylesheet" href="css/holdem.css"/>
</head>
<body>

  <div class="holdem-root">

    <!-- ── 좌측: 포커 테이블 ── -->
    <div class="poker-table-area" id="poker-table-area">

      <!-- 상단: 상대 플레이어들 -->
      <div class="opponents-area" id="opponents-area"></div>

      <!-- 중앙: 포커 테이블 -->
      <div class="poker-table" id="poker-table">
        <div class="table-header-info" style="display:flex; gap:10px; align-items:center; justify-content:center; margin-bottom:12px; flex-wrap:wrap; z-index:10;">
          <div class="pot-display">
            <span class="pot-label">팟</span>
            <span class="pot-amount" id="pot-amount">0칩</span>
          </div>
          <div class="phase-badge" id="phase-badge">대기 중</div>
          <div id="phase-ante" class="phase-ante"></div>
        </div>
        <div class="community-cards" id="community-cards"></div>
      </div>

      <!-- 내 카드 & 베팅 영역 -->
      <div class="my-area">
        <div class="my-hand-cards" id="my-hand-cards"></div>
        <div class="my-hand-rank" id="my-hand-rank">핸드 대기 중...</div>
        <div style="display:flex; align-items:center; gap:12px; margin-top: 4px;">
          <div class="my-chips-display" id="my-chips">💰 0칩</div>
          <!-- 텍사스 홀덤 감정표현 패널 -->
          <div class="emote-panel">
            <button class="emote-toggle-btn" id="btn-emote-toggle" title="감정표현">💬</button>
            <div class="emote-list" id="emote-list"></div>
          </div>
        </div>
      </div>

      <!-- ── 액션 버튼 영역 ── -->
      <div class="action-zone">

        <!-- 정보 문구 -->
        <div class="action-info" id="action-info">게임 시작을 기다리는 중...</div>

        <!-- 판 배율 · 이후 단계 배팅 미리보기 -->
        <div class="snap-multiplier-row">
          <span class="snap-label">📊 배율:</span>
          <div id="snap-multiplier" style="display:flex; align-items:center; gap:4px; flex-wrap:wrap;"></div>
          <span id="snap-remain" style="font-size:0.7rem; color:rgba(240,240,255,0.4); margin-left:6px;"></span>
        </div>

        <!-- 일반 액션 버튼 (체크/콜, 레이즈, 죽기) -->
        <div id="normal-actions" class="action-group">
          <button id="btn-stay" class="btn-action btn-stay">
            <span class="btn-icon">💰</span>
            <div class="btn-text-wrap">
              <span class="btn-label" id="btn-stay-label">체크 / 콜</span>
              <span class="btn-sub" id="btn-stay-sub">금액 자동 차감</span>
            </div>
          </button>
          <button id="btn-snap" class="btn-action btn-snap">
            <span class="btn-icon">⚡</span>
            <div class="btn-text-wrap">
              <span class="btn-label" id="btn-snap-label">레이즈</span>
              <span class="btn-sub" id="btn-snap-sub">판돈 올리기</span>
            </div>
          </button>
          <button id="btn-fold" class="btn-action btn-fold">
            <span class="btn-icon">✕</span>
            <div class="btn-text-wrap">
              <span class="btn-label">죽기</span>
              <span class="btn-sub">기권</span>
            </div>
          </button>
        </div>



        <!-- 다음 라운드 버튼 -->
        <button class="btn-next-round" id="btn-next-round" style="display:none; margin-top:8px;">
          🔄 다음 라운드
        </button>

      </div>

    </div>

    <!-- ── 우측: 정보 패널 ── -->
    <div class="info-panel">

      <div class="info-section">
        <div class="info-section-title">게임 규칙</div>
        <div class="game-stats">
          <div class="stat-row">
            <span class="stat-label">시작 칩</span>
            <span class="stat-value" id="rule-starting-chips" style="font-size:0.7rem; color:#d4af37; font-weight:700;">250 / 500 / 750칩</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">블라인드</span>
            <span class="stat-value" style="font-size:0.7rem; color:#e11d48; font-weight:bold;">SB 2칩 / BB 5칩</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">베팅 단위</span>
            <span class="stat-value gold" style="font-size:0.7rem;">프리·플랍 5 / 턴·리버 10</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">레이즈 한도</span>
            <span class="stat-value" style="font-size:0.7rem;">라운드당 최대 3회 (캡)</span>
          </div>
        </div>
      </div>

      <div class="info-section">
        <div class="info-section-title">플레이어 칩</div>
        <div class="chip-list" id="chip-list"></div>
      </div>

      <div class="info-section" style="display:flex; flex-direction:column; gap:8px;">
        <button class="btn-next-round" id="btn-back-lobby" style="display:none; width:100%; background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;">🏠 대기실로 복귀</button>
        <button class="btn-leave-game" id="btn-leave">🚪 나가기</button>
      </div>

      <div class="info-section-title" style="padding:10px 16px 4px; color:rgba(240,240,255,0.35); font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:1.5px;">액션 로그</div>
      <div class="action-log" id="action-log">
        <div class="log-entry action-deal">🃏 게임 시작 대기 중...</div>
      </div>

    </div>

  </div>

  <!-- ── 쇼다운 오버레이 ── -->
  <div class="showdown-overlay" id="showdown-overlay">
    <div class="showdown-box">
      <!-- 승자 이름 및 족보 -->
      <div class="showdown-winner-name" id="showdown-winner"></div>
      <!-- 커뮤니티 카드 (보드 카드) -->
      <div class="sd-community-area" id="sd-community-area">
        <div class="sd-community-label">🃏 보드 카드</div>
        <div class="sd-community-cards" id="sd-community-cards"></div>
      </div>
      <!-- 플레이어 패 목록 -->
      <div class="showdown-players" id="showdown-players"></div>
      <!-- 5초 카운트다운 -->
      <div class="sd-countdown" id="sd-countdown">5</div>
    </div>
  </div>

  <div id="float-msg"></div>
  <div id="toast"></div>
  <div id="emote-popup-container"></div>

  <!-- 다음라운드 버튼 오버레이 동기화 -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const main = document.getElementById('btn-next-round');
      const sd   = document.getElementById('btn-next-round-sd');
      if (main && sd) {
        new MutationObserver(() => { sd.style.display = main.style.display; })
          .observe(main, { attributes: true, attributeFilter: ['style'] });
      }
    });
  </script>

  <script type="module" src="js/holdem.js"></script>
</body>
</html>
